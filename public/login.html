<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 知著 PenMark</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">

<div class="login-card">
  <div class="login-brand">
    <span class="brand">知著<small>PenMark</small></span>
  </div>

  <div class="login-tabs">
    <button type="button" class="login-tab active" data-tab="login">登录</button>
    <button type="button" class="login-tab" data-tab="register">注册</button>
  </div>

  <!-- 登录 -->
  <form id="loginForm" class="login-form login-pane active" autocomplete="on">
    <label class="login-field">
      <span class="login-label">用户名</span>
      <input type="text" id="loginUsername" name="username" autocomplete="username"
             placeholder="4-20 位字母、数字或下划线" required>
    </label>
    <label class="login-field">
      <span class="login-label">密码</span>
      <input type="password" id="loginPassword" name="password" autocomplete="current-password"
             placeholder="请输入密码" required>
    </label>
    <div id="loginError" class="login-error" hidden></div>
    <button type="submit" class="login-submit" id="loginSubmit">登录</button>
  </form>

  <!-- 注册 -->
  <form id="registerForm" class="login-pane" autocomplete="on">
    <label class="login-field">
      <span class="login-label">用户名</span>
      <input type="text" id="regUsername" name="username" autocomplete="username"
             placeholder="4-20 位字母、数字或下划线" required>
    </label>
    <label class="login-field">
      <span class="login-label">昵称</span>
      <input type="text" id="regNickname" name="nickname" autocomplete="nickname"
             placeholder="2-20 个字符，将显示在文档中" required>
    </label>
    <label class="login-field">
      <span class="login-label">密码</span>
      <input type="password" id="regPassword" name="password" autocomplete="new-password"
             placeholder="6-16 位" required>
    </label>
    <label class="login-field">
      <span class="login-label">邀请码</span>
      <input type="text" id="regInvite" name="invite_code"
             placeholder="8 位邀请码" required>
    </label>
    <div id="regError" class="login-error" hidden></div>
    <button type="submit" class="login-submit" id="regSubmit">注册</button>
  </form>

  <div class="login-foot">
    <span>注册需邀请码 · 登录一次长期免登录</span>
  </div>
</div>

<script src="login.js"></script>
</body>
</html>
