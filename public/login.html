<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="256x256" href="/favicon-256.png">
<link rel="shortcut icon" href="/favicon.ico">

<!-- iOS Web App -->
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="知著">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<!-- PWA -->
<meta name="application-name" content="知著 PenMark">
<meta name="theme-color" content="#F7F4EC">
<link rel="manifest" href="/manifest.json">

<title>知著 PenMark</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">

<div class="login-card">
  <div class="login-brand" aria-label="知著 PenMark">
    <img src="/PenMark_Brand_Assets/penmark-logo-horizontal-light.svg" alt="" class="login-logo-img brand-logo-light">
    <img src="/PenMark_Brand_Assets/penmark-logo-horizontal-dark.svg" alt="" class="login-logo-img brand-logo-dark">
  </div>

  <div class="login-tabs">
    <button type="button" class="login-tab active" data-tab="login">登录</button>
    <button type="button" class="login-tab" data-tab="register">注册</button>
  </div>

  <!-- 登录 -->
  <form id="loginForm" class="login-pane active" autocomplete="on">
    <div class="login-field">
      <input type="text" id="loginUsername" name="username" autocomplete="username" placeholder="用户名" maxlength="20" required>
      <div class="field-error" id="loginUsernameError" hidden></div>
    </div>
    <div class="login-field">
      <div class="pwd-wrap">
        <input type="password" id="loginPassword" name="password" autocomplete="current-password" placeholder="密码" maxlength="32" required>
        <button type="button" class="pwd-toggle" data-target="loginPassword" tabindex="-1" title="显示/隐藏密码">
          <svg class="eye-open" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M1.5 8s2.2-4.5 6.5-4.5S14.5 8 14.5 8s-2.2 4.5-6.5 4.5S1.5 8 1.5 8z"/><circle cx="8" cy="8" r="2"/></svg>
          <svg class="eye-close" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" hidden><path d="M1.5 8s2.2-4.5 6.5-4.5c1.2 0 2.2.3 3.1.8"/><path d="M9.5 9.4a2 2 0 0 1-3.2-1.6"/><path d="M6.1 6.6a2 2 0 0 1 1.3-.6"/><path d="M.8.8l14.4 14.4"/></svg>
        </button>
      </div>
      <div class="field-error" id="loginPasswordError" hidden></div>
    </div>
    <div id="loginError" class="login-error" hidden></div>
    <button type="submit" class="login-submit" id="loginSubmit">登录</button>
  </form>

  <!-- 注册 -->
  <form id="registerForm" class="login-pane" autocomplete="on">
    <div class="login-field">
      <input type="text" id="regUsername" name="username" autocomplete="username" placeholder="用户名" maxlength="20" required>
      <div class="field-error" id="regUsernameError" hidden></div>
    </div>
    <div class="login-field">
      <input type="text" id="regNickname" name="nickname" autocomplete="nickname" placeholder="昵称" maxlength="20" required>
      <div class="field-error" id="regNicknameError" hidden></div>
    </div>
    <div class="login-field">
      <div class="pwd-wrap">
        <input type="password" id="regPassword" name="password" autocomplete="new-password" placeholder="密码" maxlength="32" required>
        <button type="button" class="pwd-toggle" data-target="regPassword" tabindex="-1" title="显示/隐藏密码">
          <svg class="eye-open" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M1.5 8s2.2-4.5 6.5-4.5S14.5 8 14.5 8s-2.2 4.5-6.5 4.5S1.5 8 1.5 8z"/><circle cx="8" cy="8" r="2"/></svg>
          <svg class="eye-close" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" hidden><path d="M1.5 8s2.2-4.5 6.5-4.5c1.2 0 2.2.3 3.1.8"/><path d="M9.5 9.4a2 2 0 0 1-3.2-1.6"/><path d="M6.1 6.6a2 2 0 0 1 1.3-.6"/><path d="M.8.8l14.4 14.4"/></svg>
        </button>
      </div>
      <div class="field-error" id="regPasswordError" hidden></div>
    </div>
    <div class="login-field">
      <input type="text" id="regInvite" name="invite_code" placeholder="邀请码" maxlength="8" required>
      <div class="field-error" id="regInviteError" hidden></div>
    </div>
    <div id="regError" class="login-error" hidden></div>
    <button type="submit" class="login-submit" id="regSubmit">注册</button>
  </form>
</div>

<script src="login.js"></script>
</body>
</html>
