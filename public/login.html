<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 知著 PenMark</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">

<div class="login-card">
  <div class="login-brand">
    <span class="brand">知著<small>PenMark</small></span>
  </div>
  <h1 class="login-title">欢迎回来</h1>
  <p class="login-sub">登录以继续你的图文整理</p>

  <form id="loginForm" class="login-form" autocomplete="on">
    <label class="login-field">
      <span class="login-label">手机号</span>
      <input type="tel" id="phoneInput" name="phone" autocomplete="username" inputmode="numeric"
             placeholder="请输入手机号" required>
    </label>
    <label class="login-field">
      <span class="login-label">密码</span>
      <input type="password" id="passwordInput" name="password" autocomplete="current-password"
             placeholder="请输入密码" required>
    </label>

    <div id="loginError" class="login-error" hidden></div>

    <button type="submit" class="login-submit" id="loginSubmit">登录</button>
  </form>

  <div class="login-foot">
    <span>登录一次长期免登录 · 数据按账号隔离</span>
  </div>
</div>

<script src="login.js"></script>
</body>
</html>
