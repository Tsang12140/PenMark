<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="256x256" href="/favicon-256.png">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="知著">
<meta name="application-name" content="知著 PenMark">
<meta name="theme-color" content="#F7F4EC">
<link rel="manifest" href="/manifest.json">

<title>分享文档 · 知著 PenMark</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body class="share-page">

<div class="share-progress" id="readingProgress"></div>

<div class="share-topbar">
  <a class="share-brand-mark" href="/" title="知著 PenMark" aria-label="知著 PenMark">
    <img src="/PenMark_Brand_Assets/penmark-logo-horizontal-light.svg" alt="" class="share-brand-logo brand-logo-light">
    <img src="/PenMark_Brand_Assets/penmark-logo-horizontal-dark.svg" alt="" class="share-brand-logo brand-logo-dark">
  </a>
  <div class="share-tools">
    <button class="share-theme-toggle" id="themeToggle" title="切换主题" hidden>◐</button>
    <div class="share-visitors-slot" id="shareVisitorsSlot"></div>
  </div>
</div>

<div class="share-container" id="shareContainer">
  <div class="share-loading-card">加载中…</div>
</div>

<div class="share-toc" id="shareToc" hidden></div>

<div class="toast-stack" id="toastStack"></div>

<script type="module" src="/share.js"></script>
</body>
</html>
