<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="256x256" href="/favicon-256.png">
<link rel="shortcut icon" href="/favicon.ico">

<!-- iOS Web App -->
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="知著">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<!-- PWA -->
<meta name="application-name" content="知著 PenMark">
<meta name="theme-color" content="#F7F4EC">
<link rel="manifest" href="/manifest.json">

<meta name="description" content="知著 PenMark 是一款极简在线富文本写作工具，支持公众号/微信图文一键粘贴、自动图片修复、链接卡片和飞书式目录大纲，所有内容本地优先保存。">
<meta property="og:title" content="知著 PenMark">
<meta property="og:description" content="知著 PenMark 是一款极简在线富文本写作工具，支持公众号/微信图文一键粘贴、自动图片修复、链接卡片和飞书式目录大纲，所有内容本地优先保存。">
<meta property="og:type" content="website">
<title>知著 PenMark</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">

  <!-- ============ 侧边栏 ============ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <span class="brand-lockup" aria-label="知著 PenMark">
        <img src="/PenMark_Brand_Assets/penmark-logo-horizontal-light.svg" alt="" class="brand-logo brand-logo-light">
        <img src="/PenMark_Brand_Assets/penmark-logo-horizontal-dark.svg" alt="" class="brand-logo brand-logo-dark">
      </span>
      <button class="icon-btn" id="themeToggle" title="切换主题（纸墨/雾纸/夜墨）">◐</button>
    </div>
    <div class="search-box">
      <span class="search-icon" aria-hidden="true"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="8.5" cy="8.5" r="5.5"/><path d="m12.5 12.5 4 4"/></svg></span>
      <input type="text" id="searchInput" placeholder="搜索文档…">
    </div>
    <div class="new-row">
      <button class="new-btn" id="newDocBtn">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>
        <span>新建文档</span>
      </button>
      <button class="new-folder-btn" id="newFolderBtn" title="新建文件夹">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4.5a1 1 0 0 1 1-1h3.2a1 1 0 0 1 .8.4l1 1.1a1 1 0 0 0 .8.4H13a1 1 0 0 1 1 1V12a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V4.5z"/></svg>
        <span>文件夹</span>
      </button>
    </div>
    <div class="doc-list" id="docList"></div>
    <div class="sidebar-extra" id="sidebarExtra">
      <button class="sidebar-link" id="trashBtn" title="回收站">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4.5h10M6.5 4.5V3a1 1 0 0 1 1-1h1a1 1 0 0 1 1 1v1.5M4.5 4.5l.7 8.4a1 1 0 0 0 1 .9h3.6a1 1 0 0 0 1-.9L11.5 4.5M7 7v4M9 7v4"/></svg>
        <span>回收站</span>
      </button>
      <button class="sidebar-link" id="settingsBtn" title="设置" style="display:none">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="2.2"/><path d="M8 2v1.6M8 12.4V14M2 8h1.6M12.4 8H14M3.8 3.8l1.1 1.1M11.1 11.1l1.1 1.1M3.8 12.2l1.1-1.1M11.1 4.9l1.1-1.1"/></svg>
        <span>设置</span>
      </button>
    </div>
    <div class="sidebar-foot" id="userBadge" style="display:none">
      <span class="user-avatar">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="3.5"/></svg>
      </span>
      <span class="user-name"></span>
      <button class="icon-btn" id="logoutBtn" title="退出登录">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4.5V3a1 1 0 0 0-1-1H3.5a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1H8a1 1 0 0 0 1-1v-1.5M11 5l3 3-3 3M6 8h8"/></svg>
      </button>
    </div>
  </aside>

  <!-- ============ 主区域 ============ -->
  <main class="main">
    <div class="toolbar" id="toolbar">
      <div class="tb-group">
        <select class="tb-select" id="fontSelect" title="字体">
          <option value="sans">默认</option>
          <option value="serif">宋体</option>
          <option value="kai">楷体</option>
          <option value="mono">等宽</option>
        </select>
        <select class="tb-select" id="blockStyle" title="段落样式">
          <option value="P">正文</option>
          <option value="H1">标题1</option>
          <option value="H2">标题2</option>
          <option value="H3">标题3</option>
          <option value="H4">标题4</option>
          <option value="BLOCKQUOTE">引用</option>
          <option value="PRE">代码块</option>
        </select>
      </div>

      <div class="tb-group">
        <button class="tb-btn" data-cmd="bold" title="加粗 Ctrl+B"><b>B</b></button>
        <button class="tb-btn" data-cmd="italic" title="斜体 Ctrl+I"><i>I</i></button>
        <button class="tb-btn" data-cmd="underline" title="下划线 Ctrl+U"><u>U</u></button>
        <button class="tb-btn" data-cmd="strikeThrough" title="删除线 Ctrl+Shift+X"><s>S</s></button>
        <button class="tb-btn" data-cmd="insertUnorderedList" title="无序列表 Ctrl+Shift+8">•</button>
        <button class="tb-btn" data-cmd="insertOrderedList" title="有序列表 Ctrl+Shift+7">1.</button>
        <button class="tb-btn" data-action="quote" title="引用块 Ctrl+Alt+Q"><svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><path d="M3 6c0-1.7 1.3-3 3-3v2c-.6 0-1 .4-1 1v1h1v3H3V6zm6 0c0-1.7 1.3-3 3-3v2c-.6 0-1 .4-1 1v1h1v3H9V6z"/></svg></button>
      </div>

      <div class="tb-group">
        <button class="tb-btn" data-action="link" title="插入链接 Ctrl+K"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 4.5l1-1a3 3 0 0 1 4.2 4.2l-1 1"/><path d="M9.5 11.5l-1 1a3 3 0 0 1-4.2-4.2l1-1"/><path d="M6.5 9.5l3-3"/></svg></button>
        <button class="tb-btn" data-action="code" title="行内代码 Ctrl+Shift+M"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4L1 8l4 4"/><path d="M11 4l4 4-4 4"/></svg></button>
        <button class="tb-btn" data-action="codeblock" title="代码块 Ctrl+Alt+C"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1.5" y="2.5" width="13" height="11" rx="1.5"/><path d="M5 6l-2 2 2 2"/><path d="M11 6l2 2-2 2"/></svg></button>
        <button class="tb-btn" data-action="table" title="表格 Ctrl+Alt+T"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1.5" y="2.5" width="13" height="11" rx="1"/><path d="M1.5 6h13M1.5 10h13M5.5 2.5v11M10.5 2.5v11"/></svg></button>
        <button class="tb-btn" data-action="hr" title="分隔线 Ctrl+Alt+H"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 8h12"/><circle cx="4" cy="8" r="0.8" fill="currentColor"/><circle cx="8" cy="8" r="0.8" fill="currentColor"/><circle cx="12" cy="8" r="0.8" fill="currentColor"/></svg></button>
        <button class="tb-btn" data-action="toc" title="目录"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2.5 4h11M2.5 8h7M2.5 12h7"/><circle cx="13" cy="8" r="1.2" fill="currentColor" stroke="none"/><circle cx="13" cy="12" r="1.2" fill="currentColor" stroke="none"/></svg></button>
      </div>

      <div class="tb-group">
        <button class="tb-btn" data-action="undo" title="撤销 Ctrl+Z"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h7a4 4 0 0 1 0 8H6"/><path d="M3 7l3-3M3 7l3 3"/></svg></button>
        <button class="tb-btn" data-action="redo" title="重做 Ctrl+Y"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 7H6a4 4 0 0 0 0 8h4"/><path d="M13 7l-3-3M13 7l-3 3"/></svg></button>
        <button class="tb-btn" data-cmd="removeFormat" title="清除格式 Ctrl+\\"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l10 10"/><path d="M8 2.5L6 8l3 3 5.5-2L13 4.5z"/></svg></button>
      </div>

      <div style="flex:1"></div>

      <div class="tb-group">
        <button class="tb-btn ai-toolbar-btn" data-action="aiLayout" title="AI 排版"><svg class="ai-bulb" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 18h6"/><path d="M10 21h4"/><path d="M8.5 14.5c-1.2-1-2-2.6-2-4.3A5.5 5.5 0 0 1 12 4.7a5.5 5.5 0 0 1 5.5 5.5c0 1.7-.8 3.3-2 4.3-.8.7-1.1 1.3-1.2 2h-4.6c-.1-.7-.4-1.3-1.2-2Z"/><path class="ai-bulb-spark" d="M18.8 4.2l.4-1.2.4 1.2 1.2.4-1.2.4-.4 1.2-.4-1.2-1.2-.4 1.2-.4Z"/><path class="ai-bulb-spark" d="M4.8 7.6l.3-.9.3.9.9.3-.9.3-.3.9-.3-.9-.9-.3.9-.3Z"/></svg></button>
      </div>

      <div class="tb-group">
        <button class="tb-btn" data-action="importHtml" title="导入 HTML 文件"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v8"/><path d="M5 7l3 3 3-3"/><path d="M2.5 12v1.5h11V12"/></svg></button>
      </div>
      <div class="tb-dropdown" id="exportDropdown">
        <button class="tb-btn" id="exportToggle" title="导出文档"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 10V2"/><path d="M5 5l3-3 3 3"/><path d="M2.5 12v1.5h11V12"/></svg> <span class="caret">▾</span></button>
        <div class="dropdown-menu" id="exportMenu" hidden>
          <button class="dropdown-item" data-action="exportDoc" title="导出为 Word 文档，保留排版样式">Word 文档</button>
          <button class="dropdown-item" data-action="exportHTML" title="导出为独立 HTML 网页，包含所有样式和图片">HTML 网页</button>
          <button class="dropdown-item" data-action="exportMD" title="导出为 Markdown 纯文本">Markdown</button>
          <button class="dropdown-item" data-action="exportImage" title="导出为长图 PNG，可选样式和列宽">导出图片</button>
        </div>
      </div>

      <div class="tb-group">
        <button class="tb-btn" data-action="reading" title="切换阅读模式 Ctrl+Alt+R"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 4.5h5a2 2 0 0 1 2 2v7a1.5 1.5 0 0 0-1.5-1.5h-5.5z"/><path d="M13.5 4.5h-5a2 2 0 0 0-2 2v7a1.5 1.5 0 0 1 1.5-1.5h5.5z"/></svg></button>
        <button class="tb-btn share-btn" id="shareBtn" data-action="share" title="分享文档" style="display:none">分享</button>
      </div>
    </div>

    <div class="editor-wrap" id="editorWrap">
      <div class="document-shell">
        <div class="doc-title-bar">
          <button class="mobile-menu-btn" id="mobileMenuBtn" title="文档列表">☰</button>
          <input type="text" id="docTitle" placeholder="无标题">
        </div>
        <div class="editor" id="editor" contenteditable="true" spellcheck="true" data-placeholder="在这里开始写作……"></div>
      </div>
      <div id="dropIndicator"></div>
    </div>

    <div class="statusbar" id="statusbar">
      <span class="stat"><span id="charCount">0</span> 字</span>
      <span class="dot">·</span>
      <span class="stat"><span id="imgCount">0</span> 张图片</span>
      <span class="dot">·</span>
      <span class="stat" id="saveState">已就绪</span>
      <span class="right stat">知著 PenMark</span>
    </div>
  </main>
</div>

<div class="drop-overlay" id="dropOverlay"><div class="drop-inner">松开以插入图片</div></div>
<div class="mobile-backdrop" id="mobileBackdrop"></div>

<!-- 选中浮动菜单（飞书式） -->
<div class="float-menu" id="floatMenu" hidden>
  <button class="fm-btn fm-type-trigger" data-action="blockMenu" title="段落类型" aria-haspopup="menu" aria-expanded="false">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5h14M12 5v14M8 19h8"/></svg><svg class="fm-chevron" viewBox="0 0 16 16" aria-hidden="true"><path d="m4 6 4 4 4-4"/></svg>
  </button>
  <span class="fm-divider"></span>
  <button class="fm-btn" data-cmd="bold" title="加粗"><b>B</b></button>
  <button class="fm-btn" data-cmd="italic" title="斜体"><i>I</i></button>
  <button class="fm-btn" data-cmd="underline" title="下划线"><u>U</u></button>
  <button class="fm-btn" data-cmd="strikeThrough" title="删除线"><s>S</s></button>
  <button class="fm-btn" data-action="linkMenu" title="链接"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9.5 14.5 14.5 9.5"/><path d="M7.5 16.5 5 19a3.5 3.5 0 0 1-5-5l4-4a3.5 3.5 0 0 1 5 0"/><path d="m16.5 7.5 2.5-2.5a3.5 3.5 0 0 1 5 5l-4 4a3.5 3.5 0 0 1-5 0"/></svg></button>
  <button class="fm-btn" data-action="code" title="行内代码"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m8 6-6 6 6 6M16 6l6 6-6 6M14 3l-4 18"/></svg></button>
  <span class="fm-divider"></span>
  <button class="fm-btn ai-fm-btn" data-action="aiRewrite" title="AI"><svg class="ai-bulb" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 18h6"/><path d="M10 21h4"/><path d="M8.5 14.5c-1.2-1-2-2.6-2-4.3A5.5 5.5 0 0 1 12 4.7a5.5 5.5 0 0 1 5.5 5.5c0 1.7-.8 3.3-2 4.3-.8.7-1.1 1.3-1.2 2h-4.6c-.1-.7-.4-1.3-1.2-2Z"/><path class="ai-bulb-spark" d="M18.8 4.2l.4-1.2.4 1.2 1.2.4-1.2.4-.4 1.2-.4-1.2-1.2-.4 1.2-.4Z"/><path class="ai-bulb-spark" d="M4.8 7.6l.3-.9.3.9.9.3-.9.3-.3.9-.3-.9-.9-.3.9-.3Z"/></svg></button>
  <span class="fm-divider"></span>
  <button class="fm-btn" data-cmd="removeFormat" title="清除格式"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5h12M11 5 7 17M4 20 20 4M12 19h7"/></svg></button>
</div>

<!-- 图片选中浮动菜单 -->
<div class="float-menu float-menu-img" id="floatMenuImg" hidden>
  <button class="fm-btn" data-img-action="copy" title="复制图片">复制</button>
  <button class="fm-btn" data-img-action="cut" title="剪切图片">剪切</button>
  <span class="fm-divider"></span>
  <button class="fm-btn" data-img-action="reset" title="重置大小">↺ 原始</button>
  <button class="fm-btn" data-img-action="fit" title="适应宽度">⤢ 适应宽度</button>
  <span class="fm-divider"></span>
  <button class="fm-btn" data-img-action="align-left" title="左对齐">⇤</button>
  <button class="fm-btn" data-img-action="align-center" title="居中">↔</button>
  <span class="fm-divider"></span>
  <button class="fm-btn danger" data-img-action="delete" title="删除图片">✕ 删除</button>
</div>

<!-- 右键上下文菜单 -->
<div class="ctx-menu" id="ctxMenu" hidden></div>

<div class="toast-stack" id="toastStack"></div>
<input type="file" id="importInput" class="hidden-input" accept=".html,.htm">

<!-- 分享弹窗 -->
<div class="modal-overlay" id="shareModal" hidden>
  <div class="modal share-modal">
    <div class="modal-head">
      <span class="modal-title">分享文档</span>
      <button class="modal-close" id="shareModalClose" title="关闭">×</button>
    </div>
    <div class="modal-body" id="shareModalBody"></div>
  </div>
</div>

<!-- 设置面板（管理员） -->

<!-- AI modal -->
<div class="modal-overlay" id="aiModal" hidden>
  <div class="modal ai-modal">
    <div class="modal-head">
      <span class="modal-title" id="aiModalTitle">AI</span>
      <button class="modal-close" id="aiModalClose" title="关闭">×</button>
    </div>
    <div class="modal-body" id="aiModalBody"></div>
  </div>
</div>

<div class="modal-overlay" id="settingsModal" hidden>
  <div class="modal settings-modal">
    <div class="modal-head">
      <span class="modal-title">设置</span>
      <button class="modal-close" id="settingsModalClose" title="关闭">×</button>
    </div>
    <div class="settings-tabs" id="settingsTabs">
      <button class="settings-tab active" data-stab="users">用户管理</button>
      <button class="settings-tab" data-stab="invites">邀请码</button>
      <button class="settings-tab" data-stab="review">内容审核</button>
      <button class="settings-tab" data-stab="sensitive">敏感词</button>
    </div>
    <div class="modal-body" id="settingsModalBody"></div>
  </div>
</div>

<!-- 回收站弹窗 -->
<div class="modal-overlay" id="trashModal" hidden>
  <div class="modal trash-modal">
    <div class="modal-head">
      <span class="modal-title">回收站</span>
      <button class="modal-close" id="trashModalClose" title="关闭">×</button>
    </div>
    <div class="modal-body" id="trashModalBody"></div>
  </div>
</div>

<!-- 阅读模式退出按钮 -->
<button class="reading-exit" id="readingExit" title="退出阅读模式（Esc）" hidden>✕ 退出阅读</button>

<script src="/vendor/dom-to-image-more.min.js"></script>
<script type="module" src="app.js"></script>

<!-- 导出图片：隐藏渲染区（用于生成预览和截图） -->
<div id="exportRenderContainer" style="position:fixed;left:-9999px;top:0;pointer-events:none;"></div>

<!-- 导出图片弹窗 -->
<div class="modal-overlay" id="exportImageModal" hidden>
  <div class="modal export-image-modal">
    <div class="modal-head">
      <span class="modal-title">导出图片</span>
      <button class="modal-close" id="exportImageClose" title="关闭">×</button>
    </div>
    <div class="modal-body" id="exportImageBody">
      <div class="expimg-layout">
        <div class="expimg-sidebar">
          <div class="expimg-label">样式</div>
          <div class="expimg-styles" id="expimgStyles">
            <button class="expimg-style active" data-style="default">默认</button>
            <button class="expimg-style" data-style="wechat">公众号</button>
            <button class="expimg-style" data-style="simple">简约</button>
            <button class="expimg-style" data-style="dark">暗色</button>
          </div>
          <div class="expimg-label">列宽</div>
          <div class="expimg-width-row">
            <input type="range" class="expimg-slider" id="expimgWidth" min="420" max="900" value="720" step="10">
            <span class="expimg-width-val" id="expimgWidthVal">720px</span>
          </div>
          <div class="expimg-label">分辨率</div>
          <select class="expimg-select" id="expimgScale">
            <option value="2">2x（推荐）</option>
            <option value="1">1x</option>
            <option value="3">3x</option>
          </select>
          <button class="expimg-download" id="expimgDownload">下载 PNG</button>
        </div>
        <div class="expimg-preview-wrap">
          <div class="expimg-preview-label">预览</div>
          <div class="expimg-preview" id="expimgPreview"></div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
