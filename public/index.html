<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<!-- 桌面端（鼠标设备 pointer:fine）不会被锁成移动版：CSS 里 @media (max-width:760px) 都加了
     and (pointer:coarse) 限定，只有真正的触摸设备（手机/平板）才触发移动版样式。
     桌面浏览器不管窗口多窄，都保持桌面布局，按窗口实际宽度排版，不会出现"超宽缩小"问题。 -->

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="256x256" href="/favicon-256.png">
<link rel="shortcut icon" href="/favicon.ico">

<!-- iOS Web App -->
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="知著">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<!-- PWA -->
<meta name="application-name" content="知著 PenMark">
<meta name="theme-color" content="#F7F4EC">
<link rel="manifest" href="/manifest.json">

<meta name="description" content="知著 PenMark 是一款极简在线富文本写作工具，支持公众号/微信图文一键粘贴、自动图片修复、链接卡片和飞书式目录大纲，所有内容本地优先保存。">
<meta property="og:title" content="知著 PenMark">
<meta property="og:description" content="知著 PenMark 是一款极简在线富文本写作工具，支持公众号/微信图文一键粘贴、自动图片修复、链接卡片和飞书式目录大纲，所有内容本地优先保存。">
<meta property="og:type" content="website">
<title>知著 PenMark</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="pre-auth">
<div class="app">

  <!-- ============ 侧边栏 ============ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <span class="brand-lockup" aria-label="知著 PenMark">
        <img src="/PenMark_Brand_Assets/penmark-logo-horizontal-light.svg" alt="" class="brand-logo brand-logo-light">
        <img src="/PenMark_Brand_Assets/penmark-logo-horizontal-dark.svg" alt="" class="brand-logo brand-logo-dark">
      </span>
      <button class="icon-btn" id="themeToggle" title="切换主题（纸墨/雾纸/夜墨）">◐</button>
    </div>
    <div class="search-box">
      <span class="search-icon" aria-hidden="true"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="8.5" cy="8.5" r="5.5"/><path d="m12.5 12.5 4 4"/></svg></span>
      <input type="text" id="searchInput" placeholder="搜索文档…">
    </div>
    <div class="new-row">
      <button class="new-btn" id="newDocBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
        <span>新建文档</span>
      </button>
      <button class="new-folder-btn" id="newFolderBtn" title="新建文件夹">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg>
        <span>文件夹</span>
      </button>
    </div>
    <div class="doc-list" id="docList"></div>
    <div class="sidebar-extra" id="sidebarExtra">
      <button class="sidebar-link" id="trashBtn" title="回收站">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
        <span>回收站</span>
      </button>
      <button class="sidebar-link" id="settingsBtn" title="设置" style="display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        <span>设置</span>
      </button>
    </div>
    <div class="sidebar-foot" id="userBadge" style="display:none">
      <span class="user-avatar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </span>
      <span class="user-name"></span>
      <button class="icon-btn" id="logoutBtn" title="退出登录">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <!-- ============ 主区域 ============ -->
  <main class="main">
    <div class="toolbar" id="toolbar">
      <div class="tb-group">
        <select class="tb-select" id="fontSelect" title="字体">
          <option value="sans">默认</option>
          <option value="serif">宋体</option>
          <option value="kai">楷体</option>
          <option value="mono">等宽</option>
        </select>
        <select class="tb-select" id="blockStyle" title="段落样式">
          <option value="P">正文</option>
          <option value="H1">标题1</option>
          <option value="H2">标题2</option>
          <option value="H3">标题3</option>
          <option value="H4">标题4</option>
          <option value="BLOCKQUOTE">引用</option>
          <option value="PRE">代码块</option>
        </select>
      </div>

      <div class="tb-group">
        <button class="tb-btn" data-cmd="bold" title="加粗 Ctrl+B"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h8a4 4 0 0 1 0 8H6z"/><path d="M6 12h9a4 4 0 0 1 0 8H6z"/></svg></button>
        <button class="tb-btn" data-cmd="italic" title="斜体 Ctrl+I"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg></button>
        <button class="tb-btn" data-cmd="underline" data-overflow-priority="4" data-label="下划线" title="下划线 Ctrl+U"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4v6a6 6 0 0 0 12 0V4"/><path d="M4 20h16"/></svg></button>
        <button class="tb-btn" data-cmd="strikeThrough" data-overflow-priority="1" data-label="删除线" title="删除线 Ctrl+Shift+X"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4H9a3 3 0 0 0-2.83 4"/><path d="M14 12a4 4 0 0 1 0 8H6"/><line x1="4" y1="12" x2="20" y2="12"/></svg></button>
        <button class="tb-btn" data-cmd="insertUnorderedList" title="无序列表 Ctrl+Shift+8"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></button>
        <button class="tb-btn" data-cmd="insertOrderedList" title="有序列表 Ctrl+Shift+7"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg></button>
        <button class="tb-btn" data-action="todo" data-overflow-priority="2" data-label="待办事项" title="待办事项"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></button>
        <button class="tb-btn" data-action="quote" data-overflow-priority="2" data-label="引用块" title="引用块 Ctrl+Alt+Q"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2-2-2H4c-1.25 0-2 .75-2 2v3c0 1.25.75 2 2 2h1c1 0 1 0 1 1v1c0 1-1 2-2 2H3z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2-2-2h-4c-1.25 0-2 .75-2 2v3c0 1.25.75 2 2 2h1c1 0 1 0 1 1v1c0 1-1 2-2 2h-1z"/></svg></button>
      </div>

      <div class="tb-group">
        <button class="tb-btn" data-cmd="justifyLeft" title="左对齐 Ctrl+Shift+L"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" y1="6" x2="3" y2="6"/><line x1="15" y1="12" x2="3" y2="12"/><line x1="17" y1="18" x2="3" y2="18"/></svg></button>
        <button class="tb-btn" data-cmd="justifyCenter" data-overflow-priority="4" data-label="居中对齐" title="居中对齐 Ctrl+Shift+E"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" y1="6" x2="3" y2="6"/><line x1="18" y1="12" x2="6" y2="12"/><line x1="15" y1="18" x2="9" y2="18"/></svg></button>
        <button class="tb-btn" data-cmd="justifyRight" data-overflow-priority="1" data-label="右对齐" title="右对齐 Ctrl+Shift+R"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="12" x2="9" y2="12"/><line x1="21" y1="18" x2="7" y2="18"/></svg></button>
        <button class="tb-btn" data-cmd="justifyFull" data-overflow-priority="1" data-label="两端对齐" title="两端对齐 Ctrl+Shift+J"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="12" x2="3" y2="12"/><line x1="21" y1="18" x2="3" y2="18"/></svg></button>
      </div>

      <div class="tb-group">
        <button class="tb-btn" data-action="link" title="插入链接 Ctrl+K"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></button>
        <button class="tb-btn" data-action="code" data-overflow-priority="2" data-label="行内代码" title="行内代码 Ctrl+Shift+M"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></button>
        <button class="tb-btn" data-action="codeblock" data-overflow-priority="2" data-label="代码块" title="代码块 Ctrl+Alt+C"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9l-2 3 2 3"/><path d="M15 9l2 3-2 3"/></svg></button>
        <button class="tb-btn" data-action="table" data-overflow-priority="2" data-label="表格" title="表格 Ctrl+Alt+T"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/><path d="M15 3v18"/></svg></button>
        <button class="tb-btn" data-action="hr" data-overflow-priority="1" data-label="分隔线" title="分隔线 Ctrl+Alt+H"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="4" cy="12" r="1.2" fill="currentColor" stroke="none"/><line x1="8" y1="12" x2="16" y2="12" stroke-width="2.4"/><circle cx="20" cy="12" r="1.2" fill="currentColor" stroke="none"/></svg></button>
        <button class="tb-btn" data-action="toc" data-overflow-priority="1" data-label="目录" title="目录"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="11" y1="6" x2="21" y2="6"/><line x1="11" y1="12" x2="21" y2="12"/><line x1="11" y1="18" x2="21" y2="18"/><path d="M3 5v4c0 1.1.9 2 2 2h3"/><path d="M7 11v6c0 1.1.9 2 2 2h2"/></svg></button>
      </div>

      <div class="tb-group">
        <button class="tb-btn" data-action="undo" title="撤销 Ctrl+Z"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-3"/></svg></button>
        <button class="tb-btn" data-action="redo" title="重做 Ctrl+Y"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 14 5-5-5-5"/><path d="M20 9H9a5 5 0 0 0 0 10h3"/></svg></button>
        <button class="tb-btn" data-cmd="removeFormat" data-overflow-priority="2" data-label="清除格式" title="清除格式 Ctrl+\\"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg></button>
        <button class="tb-btn" id="paintFormatToolbarBtn" data-action="paintFormat" data-overflow-priority="3" data-label="格式刷" title="格式刷 Ctrl+Shift+P"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9.06 11.9 8.07-8.06a2.85 2.85 0 1 1 4.03 4.03l-8.06 8.08"/><path d="M7.07 14.94c-1.66 0-3 1.35-3 3.02 0 1.33-2.5 1.52-2 2.02 1.08 1.1 2.49 2.02 4 2.02 2.2 0 4-1.8 4-4.04a3.01 3.01 0 0 0-3-3.02z"/></svg></button>
        <button class="share-stats-btn" id="shareStatsBtn" type="button" hidden title="访客统计">
          <span class="ss-dot"></span>
          <svg class="ss-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span class="ss-text">0</span>
        </button>
      </div>

      <div style="flex:1"></div>

      <div class="tb-group">
        <button class="tb-btn ai-toolbar-btn" data-action="aiLayout" title="AI 排版"><svg class="ai-bulb" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 18h6"/><path d="M10 21h4"/><path d="M8.5 14.5c-1.2-1-2-2.6-2-4.3A5.5 5.5 0 0 1 12 4.7a5.5 5.5 0 0 1 5.5 5.5c0 1.7-.8 3.3-2 4.3-.8.7-1.1 1.3-1.2 2h-4.6c-.1-.7-.4-1.3-1.2-2Z"/><path class="ai-bulb-spark" d="M18.8 4.2l.4-1.2.4 1.2 1.2.4-1.2.4-.4 1.2-.4-1.2-1.2-.4 1.2-.4Z"/><path class="ai-bulb-spark" d="M4.8 7.6l.3-.9.3.9.9.3-.9.3-.3.9-.3-.9-.9-.3.9-.3Z"/></svg></button>
        <button class="tb-btn ai-chat-btn" id="aiChatBtn" data-action="aiChat" title="AI 对话 Ctrl+J"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>
      </div>

      <div class="tb-group">
        <button class="tb-btn" data-action="importHtml" data-overflow-priority="2" data-label="导入 HTML" title="导入 HTML 文件"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 14 1.45-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 1.515L22.84 14"/><path d="M6 14h12a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-2a2 2 0 0 1 1-1.732z"/></svg></button>
      </div>
      <div class="tb-dropdown" id="exportDropdown">
        <button class="tb-btn" id="exportToggle" title="导出文档"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> <svg class="caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg></button>
        <div class="dropdown-menu" id="exportMenu" hidden>
          <button class="dropdown-item" data-action="exportDoc" title="导出为 Word 文档，保留排版样式">Word 文档</button>
          <button class="dropdown-item" data-action="exportHTML" title="导出为独立 HTML 网页，包含所有样式和图片">HTML 网页</button>
          <button class="dropdown-item" data-action="exportMD" title="导出为 Markdown 纯文本">Markdown</button>
          <button class="dropdown-item" data-action="exportImage" title="导出为长图 PNG，可选样式和列宽">导出图片</button>
        </div>
      </div>
      <div class="tb-dropdown" id="overflowDropdown" hidden>
        <button class="tb-btn" id="overflowToggle" type="button" title="更多" aria-haspopup="true" aria-expanded="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="5" cy="12" r="1.4" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.4" fill="currentColor" stroke="none"/><circle cx="19" cy="12" r="1.4" fill="currentColor" stroke="none"/></svg>
        </button>
        <div class="dropdown-menu" id="overflowMenu" hidden></div>
      </div>

      <div class="tb-group">
        <button class="tb-btn" data-action="reading" title="切换阅读模式 Ctrl+Alt+R"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/></svg></button>
        <button class="tb-btn share-btn" id="shareBtn" data-action="share" title="分享文档" style="display:none">分享</button>
      </div>
    </div>

    <div class="modal-body" id="aiModalBody"></div>
  </div>
</div>

<div class="modal-overlay" id="settingsModal" hidden>
  <div class="modal settings-modal">
    <div class="modal-head">
      <span class="modal-title">设置</span>
      <button class="modal-close" id="settingsModalClose" title="关闭">×</button>
    </div>
    <div class="settings-tabs" id="settingsTabs">
      <button class="settings-tab active" data-stab="users">用户管理</button>
      <button class="settings-tab" data-stab="invites">邀请码</button>
      <button class="settings-tab" data-stab="review">内容审核</button>
      <button class="settings-tab" data-stab="sensitive">敏感词</button>
    </div>
    <div class="modal-body" id="settingsModalBody"></div>
  </div>
</div>

<!-- 回收站弹窗 -->
<div class="modal-overlay" id="trashModal" hidden>
  <div class="modal trash-modal">
    <div class="modal-head">
      <span class="modal-title">回收站</span>
      <button class="modal-close" id="trashModalClose" title="关闭">×</button>
    </div>
    <div class="modal-body" id="trashModalBody"></div>
  </div>
</div>

<!-- 阅读模式退出按钮 -->
<button class="reading-exit" id="readingExit" title="退出阅读模式（Esc）" hidden>✕ 退出阅读</button>

<script src="/vendor/dom-to-image-more.min.js"></script>
<script type="module" src="app.js"></script>

<!-- 导出图片：隐藏渲染区（用于生成预览和截图） -->
<div id="exportRenderContainer" style="position:fixed;left:-9999px;top:0;pointer-events:none;"></div>

<!-- 导出图片弹窗 -->
<div class="modal-overlay" id="exportImageModal" hidden>
  <div class="modal export-image-modal">
    <div class="modal-head">
      <span class="modal-title">导出图片</span>
      <button class="modal-close" id="exportImageClose" title="关闭">×</button>
    </div>
    <div class="modal-body" id="exportImageBody">
      <div class="expimg-layout">
        <div class="expimg-sidebar">
          <div class="expimg-label">样式</div>
          <div class="expimg-styles" id="expimgStyles">
            <button class="expimg-style active" data-style="default">默认</button>
            <button class="expimg-style" data-style="wechat">公众号</button>
            <button class="expimg-style" data-style="simple">简约</button>
            <button class="expimg-style" data-style="dark">暗色</button>
          </div>
          <div class="expimg-label">列宽</div>
          <div class="expimg-width-row">
            <input type="range" class="expimg-slider" id="expimgWidth" min="420" max="900" value="720" step="10">
            <span class="expimg-width-val" id="expimgWidthVal">720px</span>
          </div>
          <div class="expimg-label">分辨率</div>
          <select class="expimg-select" id="expimgScale">
            <option value="2">2x（推荐）</option>
            <option value="1">1x</option>
            <option value="3">3x</option>
          </select>
          <button class="expimg-download" id="expimgDownload">下载 PNG</button>
        </div>
        <div class="expimg-preview-wrap">
          <div class="expimg-preview-label">预览</div>
          <div class="expimg-preview" id="expimgPreview"></div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
